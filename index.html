<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英明國中段考成績分析系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: white; @apply rounded-3xl shadow-lg border border-slate-100; }
        .view-transition { transition: all 0.3s ease; }
        .hidden-view { display: none !important; opacity: 0; }
        .active-view { display: block !important; opacity: 1; }
        .radar-box { height: 320px; width: 100%; position: relative; }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-md; }
        .medal-badge { width: 60px; height: 60px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .excellence-tag { @apply bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded-full font-black border border-amber-200 ml-2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #passwordModal { backdrop-filter: blur(8px); }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #3498db; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <h1 class="text-lg font-black tracking-tighter">英明國中分析系統</h1>
            </div>
            <div id="cloudStatus" class="text-[10px] font-bold text-slate-400 flex items-center">
                <span class="loader" id="loadingIcon"></span>
                <span id="statusText">系統初始化中...</span>
            </div>
        </header>

        <!-- 查詢頁面 -->
        <div id="searchView" class="view-transition active-view">
            <div class="max-w-md mx-auto mt-12 glass-card p-8 border-t-4 border-t-blue-600">
                <h2 class="text-xl font-black mb-6 text-center">個人成績查詢</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">選擇考試</label>
                        <select id="examSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none mt-1">
                            <option value="">載入中...</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="classNum" placeholder="班級 (如:305)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                        <input type="text" id="seatNum" placeholder="座號 (如:01)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="birthday" placeholder="生日(MMDD)" maxlength="4" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                        <input type="password" id="idLastFour" placeholder="身分證末4碼" maxlength="4" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                    </div>
                    <button id="searchBtn" onclick="window.searchGrades()" class="w-full bg-blue-600 text-white font-black rounded-xl py-4 shadow-lg hover:bg-blue-700 transition-all active:scale-95 disabled:bg-slate-300">開始分析報告</button>
                </div>
                <p class="text-[10px] text-slate-400 text-center mt-6">※ 若無法查詢請聯繫系統管理員</p>
            </div>
        </div>

        <!-- 報告頁面 -->
        <div id="reportView" class="view-transition hidden-view space-y-6 pb-20">
            <button onclick="window.backToSearch()" class="flex items-center gap-2 text-slate-400 font-bold text-xs hover:text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2"/></svg>
                返回重新查詢
            </button>

            <!-- 資訊卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-5 border-l-4 border-l-blue-600 flex items-center gap-4">
                    <div id="medalBadge" class="medal-badge bg-slate-100">🏆</div>
                    <div>
                        <div class="text-lg font-black" id="displayName">--</div>
                        <div class="text-xs font-bold text-slate-400" id="displayClass">--</div>
                    </div>
                </div>
                <div class="glass-card p-5 bg-slate-900 text-white text-center">
                    <span class="text-[9px] font-black text-slate-500 uppercase">班級排名</span>
                    <div class="text-2xl font-black" id="displayClassRank">-- / --</div>
                </div>
                <div class="glass-card p-5 bg-indigo-700 text-white text-center">
                    <span class="text-[9px] font-black text-indigo-300 uppercase">年級排名</span>
                    <div class="text-2xl font-black" id="displaySchoolRank">-- / --</div>
                </div>
            </div>

            <!-- 成績表格與圖表 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="text-xs font-black text-slate-500 uppercase">成績明細</h3>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-slate-400">權重總平均</span>
                            <div id="weightedAvgDisp" class="text-xl font-black text-blue-600">--</div>
                        </div>
                    </div>
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50/50 text-[10px] text-slate-400 font-black">
                            <tr>
                                <th class="p-3 text-left pl-6">科目</th>
                                <th class="p-3 text-center">成績</th>
                                <th class="p-3 text-center">平均</th>
                            </tr>
                        </thead>
                        <tbody id="gradeTableBody" class="font-bold"></tbody>
                    </table>
                </div>
                <div class="glass-card p-6">
                    <h3 class="text-xs font-black text-slate-500 mb-4 uppercase">實力分析圖</h3>
                    <div class="radar-box"><canvas id="radarChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 管理員入口 -->
        <footer class="mt-12 py-10 flex flex-col items-center">
            <button onclick="window.openAdminModal()" class="text-[9px] font-bold text-slate-300 tracking-widest uppercase underline hover:text-slate-500">管理員模式入口</button>
            
            <div id="adminPanel" class="hidden mt-4 w-full bg-slate-900 rounded-2xl p-6 space-y-4 shadow-2xl border border-slate-700">
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                    <h4 class="text-white text-xs font-black uppercase tracking-widest">數據管理後台</h4>
                    <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-slate-500 hover:text-white text-xs">關閉</button>
                </div>
                <div class="flex items-center gap-3">
                     <label class="cursor-pointer bg-slate-700 hover:bg-slate-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold">
                        1. 匯入 CSV
                        <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="window.handleCSV(this)">
                    </label>
                    <span class="text-[10px] text-slate-500">或直接貼上 Excel 內容於下方：</span>
                </div>
                <textarea id="rawInput" rows="8" class="w-full bg-slate-800 text-white p-3 rounded-lg text-xs font-mono border-none outline-none focus:ring-1 focus:ring-blue-500" placeholder="班級 號碼 姓名 生日 身分證末四碼 國 英 數 社 自"></textarea>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="examTitleInput" class="flex-1 bg-slate-800 text-white rounded-lg p-3 text-xs border-none outline-none focus:ring-1 focus:ring-blue-500" placeholder="請輸入考試標題 (例如：113-1第一次段考)">
                    <button id="saveBtn" onclick="window.saveData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg text-xs font-bold transition-all">2. 發布至雲端</button>
                </div>
            </div>
        </footer>
    </div>

    <!-- 管理員驗證彈窗 -->
    <div id="passwordModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card max-w-xs w-full p-8 text-center border-none">
            <h3 class="font-black text-slate-800 mb-2">管理員驗證</h3>
            <p class="text-xs text-slate-400 mb-6 font-bold">請輸入權限密碼以管理數據</p>
            <input type="password" id="adminPwdInput" class="w-full bg-slate-100 border-none rounded-xl p-3 text-center mb-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold" placeholder="****">
            <div class="flex gap-2">
                <button onclick="window.closeAdminModal()" class="flex-1 text-slate-400 font-bold text-sm">取消</button>
                <button onclick="window.verifyAdminPassword()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl font-black text-sm">確定</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================= CONFIG & INIT =================
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'inmjh-exam-system';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let cloudData = [], user = null, charts = {};

        // ================= AUTH =================
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                document.getElementById('statusText').innerText = '連線失敗，請重新載入';
            }
        };

        onAuthStateChanged(auth, u => {
            user = u;
            if (u) {
                // 讀取考試列表
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams')), snap => {
                    cloudData = snap.docs.map(d => d.data());
                    const sel = document.getElementById('examSelect');
                    if (cloudData.length) {
                        sel.innerHTML = cloudData.map(ex => `<option value="${ex.id}">${ex.id}</option>`).join('');
                    } else {
                        sel.innerHTML = '<option value="">尚無數據</option>';
                    }
                    document.getElementById('loadingIcon').classList.add('hidden');
                    document.getElementById('statusText').innerText = '雲端連線正常';
                }, err => {
                    document.getElementById('statusText').innerText = '無權限讀取數據';
                });
            }
        });

        initAuth();

        // ================= GLOBAL FUNCTIONS (掛載到 window) =================
        
        window.openAdminModal = () => {
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('adminPwdInput').focus();
        };

        window.closeAdminModal = () => {
            document.getElementById('passwordModal').classList.add('hidden');
            document.getElementById('adminPwdInput').value = '';
        };

        window.verifyAdminPassword = () => {
            const pwd = document.getElementById('adminPwdInput').value;
            if (pwd === '0307') {
                document.getElementById('adminPanel').classList.remove('hidden');
                window.closeAdminModal();
                // 滾動到下方
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
            } else {
                alert('密碼錯誤！');
            }
        };

        window.handleCSV = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const formatted = text.split('\n').map(line => line.trim().split(',').join('\t')).join('\n');
                document.getElementById('rawInput').value = formatted;
                alert('CSV 讀取成功，資料已填入框中。');
            };
            reader.readAsText(file);
        };

        window.saveData = async () => {
            if (!user) return alert("系統尚未連線完成，請稍候。");
            const btn = document.getElementById('saveBtn');
            const raw = document.getElementById('rawInput').value.trim();
            const title = document.getElementById('examTitleInput').value.trim();
            
            if (!raw || !title) return alert('請輸入完整內容與考試標題');
            
            btn.disabled = true;
            btn.innerText = '正在發布至雲端...';

            try {
                const entries = raw.split('\n').map(l => {
                    const p = l.split('\t');
                    if (p.length < 10) return null;
                    const scores = p.slice(5, 10).map(v => parseFloat(v) || 0);
                    // 權重：國5, 英3, 數4, 社3, 自3 (共18權重)
                    const weightedAvg = (scores[0]*5 + scores[1]*3 + scores[2]*4 + scores[3]*3 + scores[4]*3) / 18;
                    return { 
                        class: p[0].trim(), 
                        seat: p[1].trim(), 
                        name: p[2].trim(), 
                        birthday: p[3].trim(), 
                        idLastFour: p[4].trim(), 
                        scores, 
                        weightedAvg 
                    };
                }).filter(e => e);

                if (entries.length === 0) throw new Error("資料格式不正確（需 Tab 分隔或 10 欄位）");

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', title), {
                    id: title,
                    entries,
                    time: Date.now()
                });

                alert('發布完成！');
                document.getElementById('rawInput').value = '';
                document.getElementById('adminPanel').classList.add('hidden');
            } catch (err) {
                alert('儲存失敗：' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = '2. 發布至雲端';
            }
        };

        window.searchGrades = () => {
            const exId = document.getElementById('examSelect').value;
            const cNum = document.getElementById('classNum').value.trim();
            const sNum = document.getElementById('seatNum').value.trim();
            const bDay = document.getElementById('birthday').value.trim();
            const id4 = document.getElementById('idLastFour').value.trim();

            if(!exId || !cNum || !sNum || !bDay || !id4) return alert('請完整填寫所有查詢資訊');

            const exam = cloudData.find(ex => ex.id === exId);
            if (!exam) return alert('找不到該次考試數據');

            // 格式化座號
            const formattedSeat = sNum.padStart(2, '0');
            const foundUser = exam.entries.find(e => 
                e.class === cNum && 
                (e.seat.toString().padStart(2, '0') === formattedSeat) &&
                e.birthday === bDay &&
                e.idLastFour === id4
            );

            if (foundUser) {
                renderReport(foundUser, exam);
                document.getElementById('searchView').classList.add('hidden-view');
                document.getElementById('reportView').classList.add('active-view');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert('驗證失敗：找不到符合資料，請檢查班級、座號、生日或末4碼。');
            }
        };

        window.backToSearch = () => {
            document.getElementById('reportView').classList.remove('active-view');
            document.getElementById('searchView').classList.remove('hidden-view');
        };

        function renderReport(user, exam) {
            document.getElementById('displayName').innerText = user.name;
            document.getElementById('displayClass').innerText = `${user.class} 班 ${user.seat} 號`;
            document.getElementById('weightedAvgDisp').innerText = user.weightedAvg.toFixed(1);

            // 計算排名 (同年級開頭的班級)
            const yearPrefix = user.class.substring(0, 1);
            const gradeEntries = exam.entries.filter(e => e.class.startsWith(yearPrefix)).sort((a,b) => b.weightedAvg - a.weightedAvg);
            const classEntries = exam.entries.filter(e => e.class === user.class).sort((a,b) => b.weightedAvg - a.weightedAvg);
            
            const cRank = classEntries.findIndex(e => e.weightedAvg <= user.weightedAvg) + 1;
            const sRank = gradeEntries.findIndex(e => e.weightedAvg <= user.weightedAvg) + 1;

            document.getElementById('displayClassRank').innerText = `${cRank} / ${classEntries.length}`;
            document.getElementById('displaySchoolRank').innerText = `${sRank} / ${gradeEntries.length}`;

            // 渲染表格
            const subs = ["國文", "英文", "數學", "社會", "自然"];
            const stats = subs.map((_, i) => {
                const s = gradeEntries.map(e => e.scores[i]);
                const avg = (s.reduce((a,b)=>a+b,0) / s.length).toFixed(1);
                return { avg };
            });

            document.getElementById('gradeTableBody').innerHTML = user.scores.map((s, i) => `
                <tr class="border-b border-slate-50">
                    <td class="p-3 pl-6 text-slate-500">${subs[i]}</td>
                    <td class="p-3 text-center text-slate-800 text-lg">${s}</td>
                    <td class="p-3 text-center text-slate-400 text-xs">${stats[i].avg}</td>
                </tr>
            `).join('');

            // 雷達圖
            if (charts.radar) charts.radar.destroy();
            charts.radar = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: subs,
                    datasets: [
                        { label: '個人表現', data: user.scores, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.1)', borderWidth: 3 },
                        { label: '年級平均', data: stats.map(s => s.avg), borderColor: '#cbd5e1', borderDash: [5,5], fill: false }
                    ]
                },
                options: { 
                    maintainAspectRatio: false,
                    scales: { r: { min: 0, max: 100, ticks: { display: false } } },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }
    </script>
</body>
</html>
