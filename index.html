<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英明國中段考成績分析系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root { --primary: #2563eb; --gold: #f59e0b; --diamond: #0ea5e9; --shield: #312e81; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); color: #1e293b; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); @apply rounded-3xl shadow-xl shadow-slate-200/50; }
        .canvas-container { position: relative; margin: auto; height: 350px; width: 100%; }
        .medal-badge { width: 80px; height: 80px; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; position: relative; }
        .medal-crown { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); border: 2px solid rgba(255, 255, 255, 0.4); }
        .medal-diamond { background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%); border: 2px solid rgba(255, 255, 255, 0.4); }
        .medal-shield { background: linear-gradient(135deg, #475569 0%, #1e293b 100%); border: 2px solid rgba(255, 255, 255, 0.2); }
        .rank-label { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 999px; white-space: nowrap; }
        .loader-spin { border: 2px solid #e2e8f0; border-top: 2px solid var(--primary); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .view-transition { transition: all 0.4s ease-in-out; }
        .hidden-view { display: none; opacity: 0; transform: translateY(20px); }
        .active-view { display: block; opacity: 1; transform: translateY(0); }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-100; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 no-print">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">英明國中成績分析</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Realtime Database Version</p>
                </div>
            </div>
            <div id="cloudStatus" class="glass-card px-4 py-2 flex items-center gap-2 text-[11px] font-black text-slate-500">
                <div class="loader-spin"></div> 連線中...
            </div>
        </header>

        <div id="searchView" class="view-transition active-view">
            <div class="max-w-2xl mx-auto mt-12">
                <div class="glass-card p-10 border-t-[8px] border-t-blue-600">
                    <div class="text-center mb-10">
                        <h2 class="text-3xl font-black text-slate-800 mb-2">成績單查詢</h2>
                        <p class="text-slate-400 font-medium text-sm">請輸入資訊進行查詢</p>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-black text-slate-500 mb-2 tracking-widest">選擇考試</label>
                            <select id="examSelect" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-slate-700 outline-none">
                                <option>讀取中...</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="classNum" placeholder="班級 (如 305)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black">
                            <input type="text" id="seatNum" placeholder="座號 (如 01)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="birthday" placeholder="生日 (MMDD)" maxlength="4" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black">
                            <input type="password" id="idLastFour" placeholder="身分證末四碼" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black">
                        </div>
                        <button onclick="searchGrades()" class="w-full bg-blue-600 text-white font-black rounded-2xl py-5 shadow-xl hover:bg-blue-700 transition-all text-lg mt-4">
                            生成分析報告
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="reportView" class="view-transition hidden-view space-y-8 pb-32">
             <button onclick="backToSearch()" class="flex items-center gap-2 text-slate-400 font-black text-sm">← 返回查詢</button>
             
             <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-card p-8 border-l-[12px] border-l-blue-600 flex items-center gap-6">
                    <div id="medalBadge" class="medal-badge shrink-0">
                        <div id="medalIcon"></div>
                        <span id="rankLabel" class="rank-label"></span>
                    </div>
                    <div>
                        <span class="text-2xl font-black" id="displayName">--</span><br>
                        <span class="text-sm font-bold text-slate-400" id="displayClass">--</span>
                    </div>
                </div>
                <div class="glass-card p-8 bg-slate-900 text-white">
                    <p class="text-[10px] text-slate-500 font-black">班級排名</p>
                    <span id="displayClassRank" class="text-5xl font-black">--</span>
                </div>
                <div class="glass-card p-8 bg-indigo-700 text-white">
                    <p class="text-[10px] text-indigo-300 font-black">年級校排名</p>
                    <span id="displaySchoolRank" class="text-5xl font-black">--</span>
                </div>
             </div>

             <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-7 glass-card p-8">
                    <h3 class="font-black text-slate-400 mb-4">學科均衡度</h3>
                    <div class="canvas-container"><canvas id="radarChart"></canvas></div>
                </div>
                <div class="lg:col-span-5 glass-card overflow-hidden">
                    <table class="w-full text-center">
                        <thead class="bg-slate-50 text-[10px] font-black">
                            <tr><th class="p-4">科目</th><th>得分</th><th>平均</th></tr>
                        </thead>
                        <tbody id="gradeTableBody"></tbody>
                    </table>
                </div>
             </div>
        </div>

        <footer class="mt-20 border-t pt-10 flex flex-col items-center">
            <button onclick="toggleAdmin()" class="text-[10px] font-black text-slate-300 uppercase underline">管理員上傳數據</button>
            <div id="adminPanel" class="hidden mt-8 w-full glass-card bg-slate-900 p-8">
                <p class="text-white mb-2 text-sm">貼上 Excel 格式 (班級\t座號\t姓名\t生日\t末四碼\t國\t英\t數\t社\t自)</p>
                <textarea id="rawInput" rows="5" class="w-full bg-slate-800 rounded-2xl p-5 text-white font-mono text-xs mb-4"></textarea>
                <input type="text" id="examTitleInput" class="w-full bg-slate-800 rounded-2xl p-4 text-white mb-4" placeholder="考試名稱 (如: 112下第一次段考)">
                <button onclick="saveData()" id="saveBtn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black w-full">發布至新加坡資料庫</button>
            </div>
        </footer>
    </div>

    <script>
        // 1. 初始化 Firebase (這裡用了你圖片中的通行證)
        const firebaseConfig = {
            apiKey: "AIzaSyAb3zYeQw5l6L9JwnkRDIL9cWuah1TaMCw",
            authDomain: "inmjhexamdata.firebaseapp.com",
            databaseURL: "https://inmjhexamdata-default-rtdb.asia-southeast1.firebasedatabase.app", // 注意：補上了 Database URL
            projectId: "inmjhexamdata",
            storageBucket: "inmjhexamdata.firebasestorage.app",
            messagingSenderId: "652975438044",
            appId: "1:652975438044:web:a806e5914980bcf0819c19"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let cloudData = {};
        let charts = {};

        // 2. 監聽資料庫更新 (全自動抓取新加坡那邊的資料)
        database.ref('exams').on('value', (snapshot) => {
            cloudData = snapshot.val() || {};
            const sel = document.getElementById('examSelect');
            const keys = Object.keys(cloudData);
            if (keys.length > 0) {
                sel.innerHTML = keys.map(k => `<option value="${k}">${k}</option>`).join('');
                document.getElementById('cloudStatus').innerHTML = '● 已同步新加坡數據';
            } else {
                sel.innerHTML = '<option>尚無考試數據</option>';
                document.getElementById('cloudStatus').innerHTML = '● 資料庫為空';
            }
        });

        // 3. 查詢功能
        window.searchGrades = () => {
            const exId = document.getElementById('examSelect').value;
            const c = document.getElementById('classNum').value.trim();
            const s = document.getElementById('seatNum').value.trim();
            const b = document.getElementById('birthday').value.trim();
            const i = document.getElementById('idLastFour').value.trim();
            
            if(!cloudData[exId]) return alert("無此考試數據");
            
            const entries = cloudData[exId].entries;
            const foundUser = entries.find(e => e.class === c && e.seat === s && e.birthday === b && e.idLastFour === i);
            
            if (foundUser) {
                renderReport(foundUser, entries, exId);
                document.getElementById('searchView').classList.add('hidden-view');
                document.getElementById('reportView').classList.remove('hidden-view');
                document.getElementById('reportView').classList.add('active-view');
            } else {
                alert("找不到資料，請檢查班級、座號、生日、身分證末四碼是否正確。");
            }
        };

        // 4. 渲染分析報告
        function renderReport(user, allEntries, title) {
            const subs = ["國文", "英文", "數學", "社會", "自然"];
            document.getElementById('displayName').innerText = user.name;
            document.getElementById('displayClass').innerText = `${user.class}班 ${user.seat}號`;
            
            // 計算排名 (簡單邏輯：用加權平均排)
            const sorted = allEntries.sort((a,b) => b.weightedAvg - a.weightedAvg);
            const rank = sorted.findIndex(e => e.name === user.name) + 1;
            document.getElementById('displaySchoolRank').innerText = rank;
            
            // 畫雷達圖
            const ctxR = document.getElementById('radarChart').getContext('2d');
            if (charts.radar) charts.radar.destroy();
            charts.radar = new Chart(ctxR, {
                type: 'radar',
                data: {
                    labels: subs,
                    datasets: [{
                        label: '個人得分',
                        data: user.scores,
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: '#2563eb',
                        borderWidth: 2
                    }]
                },
                options: { scales: { r: { min: 0, max: 100 } } }
            });

            // 填寫表格
            document.getElementById('gradeTableBody').innerHTML = user.scores.map((s, idx) => `
                <tr class="border-b">
                    <td class="p-4 font-bold">${subs[idx]}</td>
                    <td class="text-blue-600 font-black">${s}分</td>
                    <td class="text-slate-400">--</td>
                </tr>
            `).join('');
        }

        // 5. 管理員發布數據 (讓你從 Excel 貼上資料)
        window.saveData = () => {
            const raw = document.getElementById('rawInput').value.trim();
            const title = document.getElementById('examTitleInput').value.trim();
            if(!raw || !title) return alert("請填寫內容");

            const rows = raw.split('\n');
            const entries = rows.map(row => {
                const p = row.split('\t'); // 假設用 Tab 分隔
                const scores = [parseFloat(p[5]), parseFloat(p[6]), parseFloat(p[7]), parseFloat(p[8]), parseFloat(p[9])];
                const avg = scores.reduce((a,b)=>a+b, 0) / 5;
                return { class: p[0], seat: p[1], name: p[2], birthday: p[3], idLastFour: p[4], scores: scores, weightedAvg: avg };
            });

            database.ref('exams/' + title).set({ entries: entries })
            .then(() => alert("成功同步至新加坡！"))
            .catch(e => alert("錯誤：" + e.message));
        };

        window.toggleAdmin = () => document.getElementById('adminPanel').classList.toggle('hidden');
        window.backToSearch = () => location.reload(); // 簡單處理
    </script>
</body>
</html>
