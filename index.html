<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英明國中段考成績分析系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }

        .glass-card {
            background: white;
            @apply rounded-3xl shadow-lg border border-slate-100;
        }

        .view-transition { transition: all 0.3s ease; }
        .hidden-view { display: none; opacity: 0; }
        .active-view { display: block; opacity: 1; }

        .radar-box { height: 320px; width: 100%; position: relative; }
        
        .tab-btn.active { @apply bg-blue-600 text-white shadow-md; }

        .medal-badge {
            width: 60px; height: 60px; border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
        }

        /* 標籤樣式 */
        .excellence-tag {
            @apply bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded-full font-black border border-amber-200 ml-2;
            animation: pulse 2s infinite;
        }

        .advantage-tag {
            @apply bg-indigo-100 text-indigo-700 text-[10px] px-2 py-0.5 rounded-full font-black border border-indigo-200 ml-2;
        }

        .potential-tag {
            @apply bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded-full font-black border border-emerald-200 ml-2;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #passwordModal {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <h1 class="text-lg font-black tracking-tighter">英明國中分析系統</h1>
            </div>
            <div id="cloudStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">系統連線中</div>
        </header>

        <!-- 查詢頁面 -->
        <div id="searchView" class="view-transition active-view">
            <div class="max-w-md mx-auto mt-12 glass-card p-8 border-t-4 border-t-blue-600">
                <h2 class="text-xl font-black mb-6 text-center">個人成績查詢</h2>
                <div class="space-y-4">
                    <select id="examSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none">
                        <option value="113-1">113學年度第一次段考 (模擬數據)</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="classNum" placeholder="班級 (如:305)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                        <input type="text" id="seatNum" placeholder="座號 (如:01)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="birthday" placeholder="生日(MMDD)" maxlength="4" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                        <input type="password" id="idLastFour" placeholder="身分證末4碼" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                    </div>
                    <button onclick="mockSearch()" class="w-full bg-blue-600 text-white font-black rounded-xl py-4 shadow-lg hover:bg-blue-700 transition-all">開始分析報告</button>
                    <p class="text-[10px] text-center text-slate-400 mt-2">提示：預覽模式下請直接點擊「開始分析」查看樣式</p>
                </div>
            </div>
        </div>

        <!-- 報告頁面 (預設隱藏) -->
        <div id="reportView" class="view-transition hidden-view space-y-6 pb-20">
            <button onclick="backToSearch()" class="text-slate-400 font-bold text-xs hover:text-blue-600">← 返回重新查詢</button>

            <!-- 資訊頭卡 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-5 border-l-4 border-l-blue-600 flex items-center gap-4">
                    <div id="medalBadge" class="medal-badge bg-slate-100">🏆</div>
                    <div>
                        <div class="text-lg font-black" id="displayName">王小明</div>
                        <div class="text-xs font-bold text-slate-400" id="displayClass">305班 01號</div>
                    </div>
                </div>
                <div class="glass-card p-5 bg-slate-900 text-white flex flex-col justify-center items-center text-center">
                    <span class="text-[9px] font-black text-slate-500 uppercase">班級排名</span>
                    <div class="text-2xl font-black"><span id="displayClassRank">3</span> <span class="text-xs text-slate-500">/ <span id="displayClassTotal">30</span></span></div>
                </div>
                <div class="glass-card p-5 bg-indigo-700 text-white flex flex-col justify-center items-center text-center">
                    <span class="text-[9px] font-black text-indigo-300 uppercase">年級排名</span>
                    <div class="text-2xl font-black"><span id="displaySchoolRank">12</span> <span class="text-xs text-indigo-300">/ <span id="displaySchoolTotal">450</span></span></div>
                </div>
            </div>

            <!-- 榮譽榜區 -->
            <div id="honorBanner" class="space-y-3">
                <div id="excellenceBox" class="glass-card p-6 border-2 border-amber-200 bg-amber-50/50">
                    <div class="flex items-start gap-4">
                        <div class="text-3xl">✨</div>
                        <div class="flex-1">
                            <h4 class="text-amber-800 font-black text-sm mb-2 uppercase tracking-widest">卓越榮譽榜 Excellence</h4>
                            <div id="excellenceMsg" class="space-y-2">
                                <div class="text-xs font-bold text-slate-600">【國文】展現了超群的學術深度，是該領域的領航員！</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 1. 表格數據 -->
            <div class="glass-card overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-xs font-black text-slate-500">1. 各科得分明細</h3>
                    <div class="text-right">
                        <span class="text-[10px] font-bold text-slate-400">權重總平均</span>
                        <div id="weightedAvgDisp" class="text-xl font-black text-blue-600">92.5</div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50/50 text-[10px] text-slate-400 font-black">
                            <tr>
                                <th class="p-3 text-left pl-6">科目</th>
                                <th class="p-3 text-center">成績</th>
                                <th class="p-3 text-center">全年級平均</th>
                                <th class="p-3 text-center">年級高標 (前50%)</th>
                                <th class="p-3 text-right pr-6 text-amber-500">年級頂標 (前25%)</th>
                            </tr>
                        </thead>
                        <tbody id="gradeTableBody" class="font-bold">
                            <!-- 範例數據 -->
                            <tr class="border-b border-slate-50">
                                <td class="p-3 pl-6 font-bold text-slate-500">國文 <span class="excellence-tag">卓越</span></td>
                                <td class="p-3 text-center text-amber-600 text-lg">95</td>
                                <td class="p-3 text-center text-slate-400 text-xs">72.1</td>
                                <td class="p-3 text-center text-slate-500 text-xs">80.5</td>
                                <td class="p-3 text-right pr-6 text-amber-500 text-xs">88.2</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 2. 雷達圖與等第 -->
            <div class="glass-card overflow-hidden">
                <div class="flex flex-col md:flex-row md:flex-nowrap w-full">
                    <div class="w-full md:w-[65%] p-6 border-b md:border-b-0 md:border-r border-slate-100">
                        <h3 class="text-xs font-black text-slate-500 mb-4 flex items-center gap-2">
                            <span class="w-1 h-3 bg-blue-600 rounded-full"></span> 2. 能力分析雷達圖
                        </h3>
                        <div class="radar-box">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                    <div class="w-full md:w-[35%] p-6 bg-slate-50/30 flex flex-col justify-center">
                        <h3 class="text-xs font-black text-slate-400 text-center mb-6">會考預估等第</h3>
                        <div id="simCards" class="flex flex-col gap-2 mx-auto w-full max-w-[200px]">
                            <div class="flex items-center justify-between px-4 py-2 bg-emerald-50 rounded-xl border border-white shadow-sm">
                                <span class="text-[10px] font-black text-slate-400">國文</span>
                                <span class="font-black text-emerald-600">A++</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 py-10 flex flex-col items-center">
            <button onclick="alert('請在實際環境中輸入管理密碼')" class="text-[9px] font-bold text-slate-300 tracking-widest uppercase underline">管理員模式入口</button>
        </footer>
    </div>

    <script>
        // 模擬查詢行為，用於展示 UI
        function mockSearch() {
            document.getElementById('searchView').classList.add('hidden-view');
            setTimeout(() => {
                document.getElementById('reportView').classList.remove('hidden-view');
                document.getElementById('reportView').classList.add('active-view');
                renderMockCharts();
            }, 300);
        }

        function backToSearch() {
            document.getElementById('reportView').classList.add('hidden-view');
            document.getElementById('reportView').classList.remove('active-view');
            setTimeout(() => {
                document.getElementById('searchView').classList.remove('hidden-view');
                document.getElementById('searchView').classList.add('active-view');
            }, 300);
        }

        function renderMockCharts() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['國文', '英文', '數學', '社會', '自然'],
                    datasets: [{
                        label: '個人表現',
                        data: [95, 88, 92, 85, 90],
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: 'rgba(37, 99, 235, 1)',
                        borderWidth: 2
                    }, {
                        label: '年級平均',
                        data: [75, 70, 65, 72, 68],
                        backgroundColor: 'rgba(203, 213, 225, 0.2)',
                        borderColor: 'rgba(203, 213, 225, 1)',
                        borderWidth: 1,
                        borderDash: [5, 5]
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { display: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
