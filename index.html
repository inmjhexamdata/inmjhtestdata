<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英明國中段考成績分析系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --primary: #2563eb;
            --gold: #f59e0b;
            --diamond: #0ea5e9;
            --shield: #312e81;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            @apply rounded-3xl shadow-xl shadow-slate-200/50;
        }

        .canvas-container { position: relative; margin: auto; height: 350px; width: 100%; }
        
        .medal-badge {
            width: 80px; height: 80px; border-radius: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .medal-crown { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); box-shadow: 0 8px 20px rgba(217, 119, 6, 0.3); border: 2px solid rgba(255, 255, 255, 0.4); }
        .medal-diamond { background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%); box-shadow: 0 8px 20px rgba(2, 132, 199, 0.3); border: 2px solid rgba(255, 255, 255, 0.4); }
        .medal-shield { background: linear-gradient(135deg, #475569 0%, #1e293b 100%); box-shadow: 0 8px 20px rgba(30, 41, 59, 0.2); border: 2px solid rgba(255, 255, 255, 0.2); }

        .rank-label {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 999px;
            white-space: nowrap; letter-spacing: 0.05em;
        }

        .loader-spin {
            border: 2px solid #e2e8f0; border-top: 2px solid var(--primary);
            border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .view-transition { transition: all 0.4s ease-in-out; }
        .hidden-view { display: none; opacity: 0; transform: translateY(20px); }
        .active-view { display: block; opacity: 1; transform: translateY(0); }

        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-100; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- 頂部導航 -->
        <header class="flex justify-between items-center mb-10 no-print">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight text-nowrap">英明國中成績分析</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Academic Analytics</p>
                </div>
            </div>
            <div id="cloudStatus" class="glass-card px-4 py-2 flex items-center gap-2 text-[11px] font-black text-slate-500">
                <div class="loader-spin"></div> 同步中
            </div>
        </header>

        <!-- 頁面 1: 查詢入口 -->
        <div id="searchView" class="view-transition active-view">
            <div class="max-w-2xl mx-auto mt-12">
                <div class="glass-card p-10 border-t-[8px] border-t-blue-600">
                    <div class="text-center mb-10">
                        <h2 class="text-3xl font-black text-slate-800 mb-2">成績單查詢</h2>
                        <p class="text-slate-400 font-medium text-sm">輸入班級座號資訊即可自動抓取同年級數據進行校排分析</p>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase mb-2 ml-1 tracking-widest">考試項目</label>
                            <select id="examSelect" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-slate-700 appearance-none">
                                <option>正在連結資料庫...</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="classNum" placeholder="班級 (如 305)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black focus:ring-4 focus:ring-blue-100 transition-all">
                            <input type="text" id="seatNum" placeholder="座號 (如 01)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black focus:ring-4 focus:ring-blue-100 transition-all">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="birthday" placeholder="生日 (MMDD)" maxlength="4" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black focus:ring-4 focus:ring-blue-100 transition-all">
                            <input type="password" id="idLastFour" placeholder="身分證末四碼" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-black focus:ring-4 focus:ring-blue-100 transition-all">
                        </div>

                        <button onclick="searchGrades()" class="w-full bg-blue-600 text-white font-black rounded-2xl py-5 shadow-xl shadow-blue-200 transition-all hover:bg-blue-700 hover:-translate-y-1 active:scale-95 text-lg mt-4">
                            生成分析報告
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 頁面 2: 分析報告 -->
        <div id="reportView" class="view-transition hidden-view space-y-8 pb-32">
            <button onclick="backToSearch()" class="no-print flex items-center gap-2 text-slate-400 hover:text-blue-600 font-black text-sm transition-colors mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" /></svg>
                返回查詢
            </button>

            <!-- 學生概況 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-1 glass-card p-8 border-l-[12px] border-l-blue-600 flex items-center gap-6">
                    <div id="medalBadge" class="medal-badge shrink-0">
                        <div id="medalIcon"></div>
                        <span id="rankLabel" class="rank-label"></span>
                    </div>
                    <div>
                        <h2 id="reportTitle" class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">校內排名報告</h2>
                        <div class="flex flex-col">
                            <span class="text-2xl font-black text-slate-800" id="displayName">--</span>
                            <span class="text-sm font-bold text-slate-400" id="displayClass">--</span>
                        </div>
                    </div>
                </div>
                
                <div class="glass-card p-8 bg-slate-900 text-white flex flex-col justify-center relative overflow-hidden">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">班級排名</p>
                    <div class="flex items-baseline gap-2">
                        <span id="displayClassRank" class="text-5xl font-black tracking-tighter">--</span>
                        <span class="text-sm font-bold text-slate-500">/ <span id="displayClassTotal">--</span> 人</span>
                    </div>
                </div>

                <div class="glass-card p-8 bg-indigo-700 text-white flex flex-col justify-center relative overflow-hidden">
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-2">全年級校排名</p>
                    <div class="flex items-baseline gap-2">
                        <span id="displaySchoolRank" class="text-5xl font-black tracking-tighter">--</span>
                        <span class="text-sm font-bold text-indigo-300">/ <span id="displaySchoolTotal">--</span> 人</span>
                    </div>
                </div>
            </div>

            <!-- 分析細節 -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-7">
                    <div class="glass-card p-8 h-full">
                        <h3 class="text-sm font-black text-slate-400 uppercase flex items-center gap-2 mb-10 tracking-[0.2em]">
                            <span class="w-1.5 h-5 bg-indigo-500 rounded-full"></span> 核心學科均衡度 (五大學科)
                        </h3>
                        <div class="canvas-container">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-5">
                    <div class="glass-card overflow-hidden flex flex-col h-full border-t-4 border-t-emerald-500">
                        <div class="p-6 border-b border-slate-50 bg-slate-50/50">
                            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">成績詳細數據</h3>
                        </div>
                        <table class="w-full">
                            <thead class="text-[10px] font-black text-slate-400 border-b bg-slate-50/30 uppercase">
                                <tr>
                                    <th class="p-4 text-left pl-8">科目</th>
                                    <th class="p-4">得分</th>
                                    <th class="p-4">年級均標</th>
                                    <th class="p-4 pr-8 text-right">年級頂標</th>
                                </tr>
                            </thead>
                            <tbody id="gradeTableBody" class="font-bold text-slate-700"></tbody>
                        </table>
                        <div class="mt-auto p-8 bg-slate-900 text-white flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">WEIGHTED AVG</p>
                                <p class="text-xs font-bold text-slate-500 italic">加權總平均</p>
                            </div>
                            <span id="weightedAvgDisp" class="text-4xl font-black">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 會考預估 (精熟/基礎/待加強) -->
            <div class="glass-card p-10 bg-gradient-to-br from-white to-violet-50/30 border-t-4 border-t-violet-500">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <h3 class="text-sm font-black text-slate-400 uppercase flex items-center gap-2 tracking-widest">
                        <span class="w-1.5 h-5 bg-violet-500 rounded-full"></span> 國中教育會考預估等第與分析
                    </h3>
                    <span class="text-[10px] px-3 py-1 bg-white border border-slate-200 rounded-full text-slate-400 font-bold">根據年級 PR 值估算</span>
                </div>
                <div id="simCards" class="grid grid-cols-1 md:grid-cols-5 gap-4"></div>
            </div>

            <!-- 學科組距分佈 -->
            <div class="glass-card p-10 border-t-4 border-t-blue-500">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
                    <h3 class="text-sm font-black text-slate-400 uppercase flex items-center gap-2 tracking-widest">
                        <span class="w-1.5 h-5 bg-blue-500 rounded-full"></span> 全年級成績組距分佈分析
                    </h3>
                    <div id="subjectTabs" class="flex flex-wrap gap-2 no-print p-1 bg-slate-100 rounded-2xl">
                        <button onclick="updateDistChart('all')" class="tab-btn active px-4 py-2 rounded-xl text-xs font-black transition-all">總平均</button>
                        <button onclick="updateDistChart(0)" class="tab-btn px-4 py-2 rounded-xl text-xs font-black transition-all">國文</button>
                        <button onclick="updateDistChart(1)" class="tab-btn px-4 py-2 rounded-xl text-xs font-black transition-all">英文</button>
                        <button onclick="updateDistChart(2)" class="tab-btn px-4 py-2 rounded-xl text-xs font-black transition-all">數學</button>
                        <button onclick="updateDistChart(3)" class="tab-btn px-4 py-2 rounded-xl text-xs font-black transition-all">社會</button>
                        <button onclick="updateDistChart(4)" class="tab-btn px-4 py-2 rounded-xl text-xs font-black transition-all">自然</button>
                    </div>
                </div>
                <div class="canvas-container h-[350px]">
                    <canvas id="distChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 管理員 -->
        <footer class="mt-24 border-t border-slate-200 pt-12 pb-32 flex flex-col items-center no-print">
            <button onclick="toggleAdmin()" class="text-slate-300 hover:text-blue-500 transition-all font-black text-[10px] tracking-[0.3em] uppercase underline underline-offset-8">管理員資料發佈端</button>
            <div id="adminPanel" class="hidden mt-8 w-full glass-card bg-slate-900 p-8">
                <textarea id="rawInput" rows="5" class="w-full bg-slate-800 border-none rounded-2xl p-5 text-slate-300 font-mono text-xs mb-4 focus:ring-2 focus:ring-blue-500" placeholder="貼上 Excel 資料: 班級 (305) TAB 座號 (01) TAB 姓名 TAB 生日 TAB 末四碼 TAB 國 TAB 英 TAB 數 TAB 社 TAB 自"></textarea>
                <div class="flex gap-4">
                    <input type="text" id="examTitleInput" class="flex-1 bg-slate-800 border-none rounded-2xl p-4 text-white font-bold" placeholder="考試名稱 (例如: 112下 第1次段考)">
                    <button id="saveBtn" onclick="saveData()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black">發布數據</button>
                </div>
            </div>
        </footer>
    </div>

    <!-- 驗證彈窗 -->
    <div id="passwordModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex items-center justify-center">
        <div class="glass-card max-w-sm w-full p-10">
            <h3 class="text-xl font-black text-center mb-6">輸入存取密碼</h3>
            <input type="password" id="adminPwdInput" class="w-full bg-slate-100 rounded-2xl p-4 text-center font-black mb-4">
            <div class="flex gap-2">
                <button onclick="closePasswordModal()" class="flex-1 font-bold text-slate-400">取消</button>
                <button onclick="verifyAdminPassword()" class="flex-[2] bg-blue-600 text-white py-3 rounded-2xl font-black">驗證</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置與初始化
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ym-middle-school';
        
        let db, auth, cloudData = [], charts = {}, user = null;
        let lastAnalysis = { user: null, gradeEntries: [] };

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        // 初始化驗證流程 (修正 Permission Denied 錯誤)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };

        // 監聽登入狀態並啟動資料監聽
        onAuthStateChanged(auth, (authUser) => {
            if (authUser) {
                user = authUser;
                startListening();
            }
        });

        initAuth();

        function startListening() {
            if (!user) return;
            // 嚴格遵守路徑規範: /artifacts/{appId}/public/data/{collectionName}
            const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'exams');
            
            onSnapshot(query(dataCol), (snap) => {
                cloudData = snap.docs.map(d => d.data());
                const sel = document.getElementById('examSelect');
                if (cloudData.length > 0) {
                    sel.innerHTML = cloudData.map(ex => `<option value="${ex.id}">${ex.id}</option>`).join('');
                } else {
                    sel.innerHTML = '<option>目前無已發布數據</option>';
                }
                document.getElementById('cloudStatus').innerHTML = '<span class="text-emerald-500">●</span> 資料同步成功';
            }, (error) => {
                console.error("Snapshot Error:", error);
                document.getElementById('cloudStatus').innerHTML = '<span class="text-rose-500">●</span> 權限或連結錯誤';
            });
        }

        window.searchGrades = () => {
            const exId = document.getElementById('examSelect').value;
            const c = document.getElementById('classNum').value.trim();
            const s = document.getElementById('seatNum').value.trim();
            const b = document.getElementById('birthday').value.trim();
            const i = document.getElementById('idLastFour').value.trim();
            
            const exam = cloudData.find(ex => ex.id === exId);
            if (!exam) return alert("請先選擇有效的考試項目");

            const foundUser = exam.entries.find(e => e.class === c && e.seat === s && e.birthday === b && e.idLastFour === i);
            if (foundUser) {
                document.getElementById('searchView').classList.add('hidden-view');
                setTimeout(() => {
                    renderReport(foundUser, exam);
                    document.getElementById('reportView').classList.remove('hidden-view');
                    document.getElementById('reportView').classList.add('active-view');
                }, 300);
            } else alert("驗證資訊有誤，請確認班級、座號、生日及身分證末四碼。");
        };

        window.backToSearch = () => {
            document.getElementById('reportView').classList.remove('active-view');
            document.getElementById('reportView').classList.add('hidden-view');
            setTimeout(() => {
                document.getElementById('searchView').classList.remove('hidden-view');
                document.getElementById('searchView').classList.add('active-view');
            }, 300);
        };

        function renderReport(targetUser, exam) {
            const gradeYear = targetUser.class.charAt(0);
            // 本地過濾與排序，避免複雜 Firestore 查詢索引問題
            const gradeEntries = exam.entries.filter(e => e.class.startsWith(gradeYear)).sort((a,b) => b.weightedAvg - a.weightedAvg);
            const classEntries = exam.entries.filter(e => e.class === targetUser.class).sort((a,b) => b.weightedAvg - a.weightedAvg);
            
            lastAnalysis = { user: targetUser, gradeEntries };

            const subs = ["國文", "英文", "數學", "社會", "自然"];
            const gradeStats = subs.map((_, i) => {
                const s = gradeEntries.map(e => e.scores[i]).sort((a,b)=>b-a);
                return { 
                    avg: (s.reduce((a,b)=>a+b,0)/s.length).toFixed(1), 
                    top: s[Math.floor(s.length * 0.12)]?.toFixed(1) || "0.0" 
                };
            });

            document.getElementById('reportTitle').innerText = `${gradeYear}年級分析報告 | ${exam.id}`;
            document.getElementById('displayClass').innerText = `${targetUser.class}班 ${targetUser.seat}號`;
            document.getElementById('displayName').innerText = targetUser.name;
            document.getElementById('weightedAvgDisp').innerText = targetUser.weightedAvg.toFixed(1);

            const cRank = classEntries.findIndex(e => e.weightedAvg === targetUser.weightedAvg) + 1;
            const gRank = gradeEntries.findIndex(e => e.weightedAvg === targetUser.weightedAvg) + 1;

            document.getElementById('displayClassRank').innerText = cRank;
            document.getElementById('displayClassTotal').innerText = classEntries.length;
            document.getElementById('displaySchoolRank').innerText = gRank;
            document.getElementById('displaySchoolTotal').innerText = gradeEntries.length;

            const gPR = (1 - gRank / gradeEntries.length);
            const badge = document.getElementById('medalBadge');
            const icon = document.getElementById('medalIcon');
            const label = document.getElementById('rankLabel');
            
            if (gPR >= 0.95) {
                badge.className = "medal-badge medal-crown"; label.innerText = "頂尖榮耀"; label.className = "rank-label bg-amber-100 text-amber-700";
                icon.innerHTML = `<svg class="h-10 w-10 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
            } else if (gPR >= 0.8) {
                badge.className = "medal-badge medal-diamond"; label.innerText = "表現優異"; label.className = "rank-label bg-sky-100 text-sky-700";
                icon.innerHTML = `<svg class="h-10 w-10 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>`;
            } else {
                badge.className = "medal-badge medal-shield"; label.innerText = "砥礪前行"; label.className = "rank-label bg-slate-700 text-white";
                icon.innerHTML = `<svg class="h-10 w-10 text-white/50" fill="currentColor" viewBox="0 0 20 20"><path d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001z"/></svg>`;
            }

            const ctxR = document.getElementById('radarChart').getContext('2d');
            if (charts.radar) charts.radar.destroy();
            charts.radar = new Chart(ctxR, {
                type: 'radar',
                data: {
                    labels: subs,
                    datasets: [
                        { label: '個人成績', data: targetUser.scores, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', borderWidth: 4, pointRadius: 5 },
                        { label: '年級平均', data: gradeStats.map(s => s.avg), borderColor: '#cbd5e1', borderDash: [5,5], pointRadius: 0, fill: false }
                    ]
                },
                options: { scales: { r: { min: 0, max: 100, ticks: { display: false }, pointLabels: { font: { size: 13, weight: 'bold', family: 'Noto Sans TC' } } } }, plugins: { legend: { display: false } } }
            });

            document.getElementById('gradeTableBody').innerHTML = targetUser.scores.map((s, idx) => `
                <tr class="border-b border-slate-50">
                    <td class="p-4 pl-8 font-black text-slate-400 text-xs">${subs[idx]}</td>
                    <td class="p-4 text-center text-blue-600 text-xl font-black">${s}</td>
                    <td class="p-4 text-center text-slate-400 font-bold">${gradeStats[idx].avg}</td>
                    <td class="p-4 text-right pr-8 text-amber-500 font-bold">${gradeStats[idx].top}</td>
                </tr>
            `).join('');

            document.getElementById('simCards').innerHTML = targetUser.scores.map((s, idx) => {
                let lvl = 'C', label = '待加強', color = 'bg-rose-500';
                if (s >= 90) { lvl = 'A++'; label = '精熟'; color = 'bg-emerald-600'; }
                else if (s >= 85) { lvl = 'A+'; label = '精熟'; color = 'bg-emerald-500'; }
                else if (s >= 80) { lvl = 'A'; label = '精熟'; color = 'bg-emerald-400'; }
                else if (s >= 70) { lvl = 'B++'; label = '基礎'; color = 'bg-blue-600'; }
                else if (s >= 60) { lvl = 'B+'; label = '基礎'; color = 'bg-blue-500'; }
                else if (s >= 40) { lvl = 'B'; label = '基礎'; color = 'bg-blue-400'; }

                return `
                <div class="glass-card p-6 text-center border-b-[6px] border-b-slate-100 flex flex-col justify-between">
                    <span class="text-[10px] font-black text-slate-400 mb-2">${subs[idx]}</span>
                    <div class="text-4xl font-black text-slate-800 mb-1">${lvl}</div>
                    <div class="mt-2 py-1 px-3 rounded-full text-[10px] font-black text-white ${color} uppercase tracking-widest">${label}</div>
                </div>`;
            }).join('');

            updateDistChart('all');
        }

        window.updateDistChart = (type) => {
            const { user: targetUser, gradeEntries } = lastAnalysis;
            const labels = ['91-100', '81-90', '71-80', '61-70', '51-60', '41-50', '31-40', '21-30', '11-20', '0-10'];
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const btnIdx = type === 'all' ? 0 : type + 1;
            document.querySelectorAll('.tab-btn')[btnIdx].classList.add('active');

            const dist = Array(10).fill(0);
            gradeEntries.forEach(e => {
                const val = type === 'all' ? e.weightedAvg : e.scores[type];
                let bin = Math.min(Math.floor(val / 10), 9);
                dist[bin]++;
            });
            const data = [...dist].reverse();
            const userVal = type === 'all' ? targetUser.weightedAvg : targetUser.scores[type];
            const userBin = 9 - Math.min(Math.floor(userVal / 10), 9);

            const ctxD = document.getElementById('distChart').getContext('2d');
            if (charts.dist) charts.dist.destroy();
            charts.dist = new Chart(ctxD, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: labels.map((_, i) => i === userBin ? '#2563eb' : '#f1f5f9'),
                        borderRadius: 10,
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { display: false }, ticks: { font: { weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 11, family: 'Noto Sans TC' } } }
                    }
                }
            });
        };

        window.toggleAdmin = () => {
            document.getElementById('passwordModal').classList.remove('hidden');
        };
        window.closePasswordModal = () => document.getElementById('passwordModal').classList.add('hidden');
        window.verifyAdminPassword = () => {
            if (document.getElementById('adminPwdInput').value === "0307") {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('passwordModal').classList.add('hidden');
            } else alert("管理密碼錯誤");
        };

        window.saveData = async () => {
            if (!user) return alert("系統尚未就緒，請稍後");
            const btn = document.getElementById('saveBtn');
            const raw = document.getElementById('rawInput').value.trim();
            const title = document.getElementById('examTitleInput').value.trim();
            if (!raw || !title) return alert("請填寫完整 Excel 數據與考試名稱");
            
            btn.disabled = true; btn.innerText = "正在儲存...";
            try {
                const entries = raw.split('\n').map(line => {
                    const p = line.split('\t');
                    if (p.length < 10) return null;
                    const scores = p.slice(5, 10).map(v => parseFloat(v) || 0);
                    const weightedAvg = (scores[0]*5 + scores[1]*3 + scores[2]*4 + scores[3]*3 + scores[4]*3) / 18;
                    return { class: p[0], seat: p[1], name: p[2], birthday: p[3], idLastFour: p[4], scores, weightedAvg };
                }).filter(e => e);

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', title), { id: title, entries, time: Date.now() });
                alert("數據發布成功");
                document.getElementById('rawInput').value = "";
            } catch (e) { 
                console.error(e);
                alert("儲存失敗: " + e.message); 
            }
            btn.disabled = false; btn.innerText = "發布數據";
        };
    </script>
</body>
</html>
