<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英明國中段考成績查詢系統新版 - Sheets 版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: white; @apply rounded-3xl shadow-lg border border-slate-100; }
        .view-transition { transition: all 0.3s ease; }
        .hidden-view { display: none; opacity: 0; }
        .active-view { display: block; opacity: 1; }
        .radar-box, .bar-box { height: 320px; width: 100%; position: relative; }
        
        /* 等第顏色樣式 */
        .rank-tag { @apply px-2 py-1 rounded-lg font-black text-xs; }
        .rank-A { background-color: #fee2e2; color: #ef4444; }
        .rank-B { background-color: #dcfce7; color: #16a34a; }
        .rank-C { background-color: #dbeafe; color: #2563eb; }

        /* 管理員驗證 Modal 樣式 */
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <h1 class="text-lg font-black tracking-tighter text-slate-800">英明國中段考成績查詢系統新版</h1>
            </div>
            <div id="cloudStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">正在連線至 Google Sheets...</div>
        </header>

        <!-- Search View -->
        <div id="searchView" class="view-transition active-view">
            <div class="max-w-md mx-auto mt-12 glass-card p-8 border-t-4 border-t-blue-600">
                <h2 class="text-xl font-black mb-6 text-center text-slate-800">個人成績查詢</h2>
                <div class="space-y-4">
                    <select id="examSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">正在載入雲端試算表...</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="classNum" placeholder="班級 (如:305)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="seatNum" placeholder="座號 (如:01)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="birthday" placeholder="生日(MMDD)" maxlength="4" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="password" id="idLastFour" placeholder="身分證末4碼" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button id="searchBtn" onclick="searchGrades()" class="w-full bg-blue-600 text-white font-black rounded-xl py-4 shadow-lg hover:bg-blue-700 active:scale-95 transition-all text-sm tracking-widest">開始查詢</button>
                </div>
            </div>
        </div>

        <!-- Report View -->
        <div id="reportView" class="view-transition hidden-view space-y-6 pb-20">
            <button onclick="backToSearch()" class="text-slate-400 font-bold text-xs hover:text-blue-600 transition-colors">← 返回重新查詢</button>
            
            <!-- Quick Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-5 border-l-4 border-l-blue-600 flex items-center gap-4">
                    <div class="w-[60px] h-[60px] rounded-2xl bg-slate-100 flex items-center justify-center text-2xl">🏆</div>
                    <div>
                        <div class="text-lg font-black text-slate-800" id="displayName">--</div>
                        <div class="text-xs font-bold text-slate-400" id="displayClass">--</div>
                    </div>
                </div>
                <div class="glass-card p-5 bg-slate-900 text-white flex flex-col justify-center items-center shadow-indigo-200">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">班級排名</span>
                    <div class="text-2xl font-black italic"><span id="displayClassRank">--</span> <span class="text-xs text-slate-500 font-normal">/ <span id="displayClassTotal">--</span></span></div>
                </div>
                <div class="glass-card p-5 bg-indigo-700 text-white flex flex-col justify-center items-center shadow-indigo-200">
                    <span class="text-[9px] font-black text-indigo-300 uppercase tracking-widest mb-1">年級排名</span>
                    <div class="text-2xl font-black italic"><span id="displaySchoolRank">--</span> <span class="text-xs text-indigo-300 font-normal">/ <span id="displaySchoolTotal">--</span></span></div>
                </div>
            </div>

            <!-- Honor Banner -->
            <div id="honorBanner" class="hidden space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="excellenceBox" class="hidden glass-card p-6 border-2 border-amber-200 bg-amber-50/50">
                        <div id="excellenceMsg"></div>
                    </div>
                    <div id="advantageBox" class="hidden glass-card p-6 border-2 border-indigo-200 bg-indigo-50/50">
                        <div id="advantageMsg"></div>
                    </div>
                </div>
                <div id="potentialBox" class="hidden glass-card p-6 border-2 border-emerald-200 bg-emerald-50/50">
                    <div id="potentialMsg"></div>
                </div>
            </div>

            <!-- Grades Table -->
            <div class="glass-card overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-wider">成績明細</h3>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-slate-400">加權平均</span>
                        <div id="weightedAvgDisp" class="text-xl font-black text-blue-600 italic">--</div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-[10px] text-slate-400 font-bold uppercase">
                            <tr>
                                <th class="p-3 text-left pl-6">科目</th>
                                <th class="p-3 text-center">我的得分</th>
                                <th class="p-3 text-center">年級平均</th>
                                <th class="p-3 text-center text-blue-600">年級高標</th>
                                <th class="p-3 text-center">會考預估</th>
                            </tr>
                        </thead>
                        <tbody id="gradeTableBody">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>
                <div class="p-3 bg-blue-50 text-[10px] text-blue-700 font-medium text-center">
                    提示：會考等第係根據該年級成績百分比推估；「年級高標」為年級前 50% 同學之平均分數。
                </div>
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card p-6">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest text-center">學科均衡度分析</h3>
                    <div class="radar-box">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">年級組距 (人數分佈)</h3>
                        <button id="backToMainDist" onclick="resetDistributionUI()" class="hidden bg-slate-800 text-white text-[10px] px-2 py-1 rounded hover:bg-slate-700 transition-all">← 返回總覽</button>
                    </div>
                    <div id="distContainer" class="space-y-4">
                        <div class="flex justify-center gap-2 mb-2">
                            <select id="distSubjectSelect" onchange="resetDistributionUI()" class="bg-slate-100 border-none rounded-lg px-3 py-1 text-xs font-bold text-slate-600 outline-none">
                                <option value="0">國文</option>
                                <option value="1">英文</option>
                                <option value="2">數學</option>
                                <option value="3">社會</option>
                                <option value="4">自然</option>
                            </select>
                        </div>
                        <div class="bar-box">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Admin Section -->
        <footer class="mt-12 py-10 flex flex-col items-center">
            <!-- 原文字改為盾牌圖示 -->
            <button onclick="toggleAdminAuthModal()" class="text-slate-300 hover:text-blue-500 transition-all active:scale-90" title="管理員登入">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </button>

            <!-- 第一層驗證：帳號檢查 -->
            <div id="adminAuthModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 space-y-6">
                    <div class="text-center">
                        <div class="inline-flex p-3 rounded-full bg-blue-50 text-blue-600 mb-4">
                            <i data-lucide="lock" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-800">管理員驗證</h3>
                        <p class="text-xs font-bold text-slate-400 mt-1">請輸入許可的 Google 帳號以解鎖功能</p>
                    </div>
                    <div class="space-y-3">
                        <input type="email" id="adminAccount" placeholder="Google 帳號 (Email)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 text-center">
                        <div class="flex gap-2">
                            <button onclick="toggleAdminAuthModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold rounded-xl py-3 hover:bg-slate-200 transition-all text-sm">取消</button>
                            <button onclick="verifyAdminAccount()" class="flex-2 bg-blue-600 text-white font-black rounded-xl py-3 px-6 shadow-lg hover:bg-blue-700 transition-all text-sm tracking-widest">驗證登入</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 第二層功能頁面 (原功能不變) -->
            <div id="adminPanel" class="hidden mt-4 w-full bg-slate-900 rounded-2xl p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <div class="text-white text-[10px] font-bold opacity-50 uppercase tracking-widest">Excel 匯入模式</div>
                    <button onclick="closeAdminPanel()" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="text-white text-[10px] font-bold opacity-30 uppercase">欄位順序：班級、座號、姓名、生日、身分證末4、國、英、數、社、自、加權、班排、校排</div>
                <textarea id="rawInput" rows="5" class="w-full bg-slate-800 text-white p-3 rounded-lg text-xs font-mono outline-none border border-slate-700" placeholder="從 Excel 複製 13 個欄位貼上..."></textarea>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="examTitleInput" class="flex-1 bg-slate-800 text-white rounded-lg p-3 text-xs" placeholder="考試標題 (例如: 113-1第一次段考)">
                    <input type="password" id="adminSecretToken" class="bg-slate-800 text-white rounded-lg p-3 text-xs font-mono" placeholder="輸入管理私鑰">
                    <button id="saveBtn" onclick="saveToSheets()" class="bg-blue-600 text-white px-6 py-3 rounded-lg text-xs font-bold shadow-lg active:scale-95 transition-all">發布至 Sheets</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyX9rQwndThgxZva9ePiLLScuGb6-L1N9CuMP5MxSWaWSzBMOGxHJaT5E6Ee8JhAzSc/exec"; 
        
        const ALLOWED_ADMIN_EMAILS = [
            "rivaul731208@apps.inmjh.kh.edu.tw"
        
        ];

        let cloudData = [];
        let charts = {};
        let currentReportData = { user: null, exam: null };
        let isDrilledDown = false;

        const CAP_RULES = {
            "國文": [6.56, 10.38, 13.11, 19.67, 16.94, 24.59, 8.74],
            "英文": [6.56, 4.92, 12.57, 14.75, 15.30, 20.22, 25.68],
            "數學": [6.56, 7.10, 14.75, 12.57, 14.21, 18.03, 26.78],
            "社會": [6.56, 2.73, 8.74, 23.50, 16.94, 32.24, 9.29],
            "自然": [3.28, 7.65, 6.56, 15.85, 17.49, 30.05, 19.13]
        };
        const CAP_LABELS = ["A++", "A+", "A", "B++", "B+", "B", "C"];

        async function fetchExams() {
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read' }) });
                const result = await response.json();
                if (result.result === 'success') {
                    cloudData = result.data;
                    const select = document.getElementById('examSelect');
                    if (cloudData.length > 0) {
                        select.innerHTML = cloudData.map(ex => `<option value="${ex.id}">${ex.id}</option>`).join('');
                        document.getElementById('cloudStatus').innerText = 'Sheets 資料讀取成功';
                    } else {
                        select.innerHTML = '<option value="">尚無考試資料</option>';
                        document.getElementById('cloudStatus').innerText = '資料庫為空';
                    }
                }
            } catch (e) {
                document.getElementById('cloudStatus').innerText = '連線失敗';
            }
        }

        window.onload = () => {
            fetchExams();
            lucide.createIcons(); // 初始化圖示
        };

        // --- 管理員第一層驗證邏輯 ---
        function toggleAdminAuthModal() {
            const modal = document.getElementById('adminAuthModal');
            modal.classList.toggle('hidden');
            document.getElementById('adminAccount').value = "";
        }

        function verifyAdminAccount() {
            const email = document.getElementById('adminAccount').value.trim().toLowerCase();
            if (!email) return alert("請輸入帳號");
            
            if (ALLOWED_ADMIN_EMAILS.map(e => e.toLowerCase()).includes(email)) {
                toggleAdminAuthModal();
                document.getElementById('adminPanel').classList.remove('hidden');
                // 平滑滾動到底部
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                alert("未經授權的帳號，請聯繫系統管理員。");
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.add('hidden');
        }

        window.searchGrades = () => {
            const exId = document.getElementById('examSelect').value;
            const c = document.getElementById('classNum').value.trim();
            const s = document.getElementById('seatNum').value.trim();
            const b = document.getElementById('birthday').value.trim();
            const idL = document.getElementById('idLastFour').value.trim();

            if (!exId) return alert("請選擇考試次別");

            const exam = cloudData.find(ex => ex.id === exId);
            if (!exam) return alert("找不到此考試資料");

            const user = exam.entries.find(e => 
                e.class === c && 
                e.seat.padStart(2, '0') === s.padStart(2, '0') && 
                e.birthday === b && 
                e.idLastFour === idL
            );

            if (user) {
                currentReportData = { user, exam };
                isDrilledDown = false;
                renderReport(user, exam);
                document.getElementById('searchView').classList.add('hidden-view');
                document.getElementById('reportView').classList.replace('hidden-view', 'active-view');
            } else {
                alert("查無資料，請確認班級、座號、生日及身分證末4碼是否正確。");
            }
        };

        function predictCAP(subjectName, myScore, allScores) {
            const rules = CAP_RULES[subjectName];
            if (!rules) return "--";
            const sorted = [...allScores].sort((a, b) => b - a);
            const total = sorted.length;
            let cumulativePercent = 0;
            for (let i = 0; i < rules.length; i++) {
                cumulativePercent += rules[i];
                let lastIndex = Math.floor(total * (cumulativePercent / 100)) - 1;
                if (lastIndex < 0) lastIndex = 0;
                if (lastIndex >= total) lastIndex = total - 1;
                const thresholdScore = sorted[lastIndex];
                if (myScore >= thresholdScore) return CAP_LABELS[i];
            }
            return "C";
        }

        function resetDistributionUI() {
            isDrilledDown = false;
            document.getElementById('backToMainDist').classList.add('hidden');
            updateDistributionUI();
        }

        function updateDistributionUI(drilldownRange = null) {
            const { user, exam } = currentReportData;
            if (!user || !exam) return;
            const subIdx = parseInt(document.getElementById('distSubjectSelect').value);
            const myScore = user.scores[subIdx];
            const gradePrefix = user.class.substring(0, 1);
            const allScores = exam.entries
                .filter(e => e.class.startsWith(gradePrefix))
                .map(e => e.scores[subIdx]);

            let ranges = [];
            let isDetailed = false;

            if (drilldownRange) {
                isDetailed = true;
                isDrilledDown = true;
                document.getElementById('backToMainDist').classList.remove('hidden');
                
                for (let i = drilldownRange.min; i < drilldownRange.max && i < 100; i += 2) {
                    ranges.push({ label: `${i}-${(i + 1.9).toFixed(1)}`, min: i, max: i + 1.99 });
                }
                if (drilldownRange.max >= 100) {
                    ranges.push({ label: '100', min: 100, max: 100 });
                }
            } else {
                isDetailed = false;
                ranges = [
                    { label: '0-19', min: 0, max: 19.9 },
                    { label: '20-29', min: 20, max: 29.9 },
                    { label: '30-39', min: 30, max: 39.9 },
                    { label: '40-49', min: 40, max: 49.9 },
                    { label: '50-59', min: 50, max: 59.9 },
                    { label: '60-69', min: 60, max: 69.9, clickable: true },
                    { label: '70-79', min: 70, max: 79.9, clickable: true },
                    { label: '80-89', min: 80, max: 89.9, clickable: true },
                    { label: '90-99', min: 90, max: 99.9, clickable: true },
                    { label: '100', min: 100, max: 100 }
                ];
            }

            const labels = ranges.map(r => r.label);
            const dataCounts = ranges.map(r => allScores.filter(s => s >= r.min && s <= r.max).length);
            const backgroundColors = ranges.map(r => (myScore >= r.min && myScore <= r.max) ? 'rgba(37, 99, 235, 0.8)' : 'rgba(203, 213, 225, 0.5)');
            const borderColors = ranges.map(r => (myScore >= r.min && myScore <= r.max) ? '#1d4ed8' : '#e2e8f0');

            if (charts.bar) charts.bar.destroy();
            
            const ctx = document.getElementById('barChart').getContext('2d');
            charts.bar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '人數',
                        data: dataCounts,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 1,
                        borderRadius: 6,
                        ranges: ranges
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    onHover: (event, chartElement) => {
                        if (!isDetailed && chartElement.length > 0) {
                            const index = chartElement[0].index;
                            if (ranges[index].clickable) {
                                event.native.target.style.cursor = 'pointer';
                                return;
                            }
                        }
                        event.native.target.style.cursor = 'default';
                    },
                    onClick: (event, chartElement) => {
                        if (!isDetailed && chartElement.length > 0) {
                            const index = chartElement[0].index;
                            const clickedRange = ranges[index];
                            if (clickedRange.clickable) {
                                const targetRange = { 
                                    min: clickedRange.min, 
                                    max: clickedRange.min === 90 ? 100 : clickedRange.min + 10 
                                };
                                updateDistributionUI(targetRange);
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const index = context.dataIndex;
                                    const count = context.parsed.y;
                                    const range = ranges[index];
                                    let tip = `人數: ${count} 人`;
                                    if (!isDetailed && range.clickable) tip += " (點擊查看細部)";
                                    return tip;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            ticks: { precision: 0, color: '#94a3b8', font: { size: 10 } },
                            grid: { color: '#f1f5f9' }
                        },
                        x: {
                            ticks: { color: '#64748b', font: { size: 10, weight: '700' } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function calculateRank(targetValue, allValues) {
            let rank = 1;
            allValues.forEach(val => { if (val > targetValue) rank++; });
            return rank;
        }

        function renderReport(targetUser, exam) {
            const subs = ["國文", "英文", "數學", "社會", "自然"];
            const gradePrefix = targetUser.class.substring(0, 1);
            
            const gradeEntries = exam.entries.filter(e => e.class.startsWith(gradePrefix));
            const classEntries = exam.entries.filter(e => e.class === targetUser.class);

            const allGradeAvgs = gradeEntries.map(e => e.weightedAvg);
            const allClassAvgs = classEntries.map(e => e.weightedAvg);
            
            const sysSchoolRank = calculateRank(targetUser.weightedAvg, allGradeAvgs);
            const sysClassRank = calculateRank(targetUser.weightedAvg, allClassAvgs);

            const gradeStats = subs.map((name, i) => {
                const subScores = gradeEntries.map(e => e.scores[i]).sort((a, b) => b - a);
                const avg = subScores.reduce((a, b) => a + b, 0) / subScores.length;
                const top50Count = Math.ceil(subScores.length * 0.5);
                const top50Scores = subScores.slice(0, top50Count);
                const highBarAvg = top50Scores.reduce((a, b) => a + b, 0) / top50Scores.length;
                const prediction = predictCAP(name, targetUser.scores[i], subScores);
                return { avg: avg.toFixed(1), highBar: highBarAvg.toFixed(1), cap: prediction };
            });

            document.getElementById('displayName').innerText = targetUser.name;
            document.getElementById('displayClass').innerText = `${targetUser.class}班 ${targetUser.seat}號`;
            
            document.getElementById('displayClassRank').innerText = sysClassRank;
            document.getElementById('displayClassTotal').innerText = classEntries.length;
            document.getElementById('displaySchoolRank').innerText = sysSchoolRank;
            document.getElementById('displaySchoolTotal').innerText = gradeEntries.length;
            
            document.getElementById('weightedAvgDisp').innerText = targetUser.weightedAvg.toFixed(2);

            const tableBody = document.getElementById('gradeTableBody');
            tableBody.innerHTML = targetUser.scores.map((s, i) => {
                const cap = gradeStats[i].cap;
                let capClass = "rank-C";
                if (cap.startsWith("A")) capClass = "rank-A";
                else if (cap.startsWith("B")) capClass = "rank-B";
                return `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-bold text-slate-500 pl-6">${subs[i]}</td>
                    <td class="p-4 text-center text-slate-700 font-black text-lg">${s}</td>
                    <td class="p-4 text-center text-slate-400 font-medium">${gradeStats[i].avg}</td>
                    <td class="p-4 text-center text-blue-600 font-bold">${gradeStats[i].highBar}</td>
                    <td class="p-4 text-center">
                        <span class="rank-tag ${capClass}">${cap}</span>
                    </td>
                </tr>
            `}).join('');

            resetDistributionUI();

            if (charts.radar) charts.radar.destroy();
            charts.radar = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: subs,
                    datasets: [
                        { label: '我的得分', data: targetUser.scores, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', borderWidth: 3, pointBackgroundColor: '#2563eb', pointBorderColor: '#fff', pointRadius: 4, order: 1 },
                        { label: '年級平均', data: gradeStats.map(s => s.avg), borderColor: '#cbd5e1', borderDash: [5, 5], fill: false, borderWidth: 2, pointRadius: 0, order: 3 },
                        { label: '年級高標', data: gradeStats.map(s => s.highBar), borderColor: '#f59e0b', borderDash: [8, 3], fill: false, borderWidth: 2, pointRadius: 0, order: 2 }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: { 
                            beginAtZero: true, max: 100, ticks: { display: false }, 
                            grid: { color: '#f1f5f9' }, angleLines: { color: '#f1f5f9' }, 
                            pointLabels: { font: { size: 12, weight: '900' }, color: '#64748b' } 
                        }
                    },
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' }, padding: 15 } } }
                }
            });

            document.getElementById('honorBanner').classList.remove('hidden');
            const excellence = subs.filter((name, i) => gradeStats[i].cap.startsWith("A"));
            if (excellence.length) {
                document.getElementById('excellenceBox').classList.remove('hidden');
                document.getElementById('excellenceMsg').innerHTML = `<div class="flex items-center gap-2"><span class="text-2xl">🏅</span><div><div class="text-xs font-bold text-amber-500 uppercase tracking-tighter">頂尖學科</div><div class="text-sm font-black text-amber-800">${excellence.join('、')} 達到 A 以上！</div></div></div>`;
            } else { document.getElementById('excellenceBox').classList.add('hidden'); }
            
            const advantage = subs.filter((name, i) => gradeStats[i].cap === "B++");
            if (advantage.length) {
                document.getElementById('advantageBox').classList.remove('hidden');
                document.getElementById('advantageMsg').innerHTML = `<div class="flex items-center gap-2"><span class="text-2xl">📈</span><div><div class="text-xs font-bold text-indigo-500 uppercase tracking-tighter">優勢學科</div><div class="text-sm font-black text-indigo-800">${advantage.join('、')} 達到 B++！</div></div></div>`;
            } else { document.getElementById('advantageBox').classList.add('hidden'); }

            const nonBPlusPlusIndices = subs.map((_, i) => i).filter(i => {
                const cap = gradeStats[i].cap;
                return cap === "B+" || cap === "B" || cap === "C";
            });

            if (nonBPlusPlusIndices.length > 0) {
                let pIdx = nonBPlusPlusIndices[0];
                nonBPlusPlusIndices.forEach(idx => { if (targetUser.scores[idx] > targetUser.scores[pIdx]) pIdx = idx; });
                const encouragements = ["再加把勁，你離突破目標只差一小步！", "這科很有潛力，只要多花一點心思就能大躍進！", "基礎已經穩固，保持專注必能更上一層樓！", "相信自己，下次這科一定能成為你的優勢！", "你其實做得到，繼續努力讓潛力化為實力！"];
                document.getElementById('potentialBox').classList.remove('hidden');
                document.getElementById('potentialMsg').innerHTML = `<div class="flex items-center gap-2"><span class="text-2xl">🌱</span><div><div class="text-xs font-bold text-emerald-500 uppercase tracking-tighter">潛力學科</div><div class="text-sm font-black text-emerald-800"><span class="text-emerald-600">${subs[pIdx]}</span>。${encouragements[Math.floor(Math.random() * encouragements.length)]}</div></div></div>`;
            } else { document.getElementById('potentialBox').classList.add('hidden'); }
        }

        window.backToSearch = () => {
            document.getElementById('reportView').classList.replace('active-view', 'hidden-view');
            document.getElementById('searchView').classList.replace('hidden-view', 'active-view');
        };

        window.saveToSheets = async () => {
            const token = document.getElementById('adminSecretToken').value;
            const title = document.getElementById('examTitleInput').value.trim();
            const raw = document.getElementById('rawInput').value.trim();
            if (!token || !title || !raw) return alert("請完整填寫管理員資訊");
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "正在同步...";
            let entries = raw.split('\n').map(line => {
                const p = line.split('\t');
                if (p.length < 13) return null;
                const scores = [parseFloat(p[5])||0, parseFloat(p[6])||0, parseFloat(p[7])||0, parseFloat(p[8])||0, parseFloat(p[9])||0];
                const avg = ((scores[0]*5)+(scores[2]*4)+(scores[1]*3)+(scores[4]*3)+(scores[3]*3))/18;
                return { class: p[0].trim(), seat: p[1].trim(), name: p[2].trim(), birthday: p[3].trim(), idLastFour: p[4].trim(), scores, weightedAvg: avg, classRank: p[11], schoolRank: p[12] };
            }).filter(e => e);

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save', token, title, entries }) });
                const r = await res.json();
                if (r.result === 'success') { alert("發布成功！"); location.reload(); } else alert("失敗：" + r.message);
            } catch (e) { alert("連線錯誤"); } finally { btn.disabled = false; btn.innerText = "發布至 Sheets"; }
        };
    </script>
</body>
</html>
