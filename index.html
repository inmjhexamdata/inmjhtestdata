<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英明國中段考成績分析系統 - Sheets 版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: white; @apply rounded-3xl shadow-lg border border-slate-100; }
        .view-transition { transition: all 0.3s ease; }
        .hidden-view { display: none; opacity: 0; }
        .active-view { display: block; opacity: 1; }
        .radar-box { height: 320px; width: 100%; position: relative; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <h1 class="text-lg font-black tracking-tighter">英明國中分析系統</h1>
            </div>
            <div id="cloudStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">正在連線至 Google Sheets...</div>
        </header>

        <!-- 查詢頁面 -->
        <div id="searchView" class="view-transition active-view">
            <div class="max-w-md mx-auto mt-12 glass-card p-8 border-t-4 border-t-blue-600">
                <h2 class="text-xl font-black mb-6 text-center">個人成績查詢</h2>
                <div class="space-y-4">
                    <select id="examSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none">
                        <option value="">正在載入雲端試算表...</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="classNum" placeholder="班級 (如:305)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                        <input type="text" id="seatNum" placeholder="座號 (如:01)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="birthday" placeholder="生日(MMDD)" maxlength="4" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                        <input type="password" id="idLastFour" placeholder="身分證末4碼" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-bold">
                    </div>
                    <button id="searchBtn" onclick="searchGrades()" class="w-full bg-blue-600 text-white font-black rounded-xl py-4 shadow-lg hover:bg-blue-700 transition-all">開始分析報告</button>
                </div>
            </div>
        </div>

        <!-- 報告頁面 -->
        <div id="reportView" class="view-transition hidden-view space-y-6 pb-20">
            <button onclick="backToSearch()" class="text-slate-400 font-bold text-xs">← 返回重新查詢</button>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-5 border-l-4 border-l-blue-600 flex items-center gap-4">
                    <div class="w-[60px] h-[60px] rounded-2xl bg-slate-100 flex items-center justify-center text-2xl">🏆</div>
                    <div>
                        <div class="text-lg font-black" id="displayName">--</div>
                        <div class="text-xs font-bold text-slate-400" id="displayClass">--</div>
                    </div>
                </div>
                <div class="glass-card p-5 bg-slate-900 text-white flex flex-col justify-center items-center">
                    <span class="text-[9px] font-black text-slate-500 uppercase">班級排名</span>
                    <div class="text-2xl font-black"><span id="displayClassRank">--</span> <span class="text-xs text-slate-500">/ <span id="displayClassTotal">--</span></span></div>
                </div>
                <div class="glass-card p-5 bg-indigo-700 text-white flex flex-col justify-center items-center">
                    <span class="text-[9px] font-black text-indigo-300 uppercase">年級排名</span>
                    <div class="text-2xl font-black"><span id="displaySchoolRank">--</span> <span class="text-xs text-indigo-300">/ <span id="displaySchoolTotal">--</span></span></div>
                </div>
            </div>

            <!-- 勳章與優勢顯示 -->
            <div id="honorBanner" class="hidden space-y-3">
                <div id="excellenceBox" class="hidden glass-card p-6 border-2 border-amber-200 bg-amber-50/50"><div id="excellenceMsg"></div></div>
                <div id="advantageBox" class="hidden glass-card p-6 border-2 border-indigo-200 bg-indigo-50/50"><div id="advantageMsg"></div></div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="p-4 bg-slate-50 flex justify-between items-center">
                    <h3 class="text-xs font-black text-slate-500">成績明細與年級對比</h3>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-slate-400">加權平均</span>
                        <div id="weightedAvgDisp" class="text-xl font-black text-blue-600">--</div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-[10px] text-slate-400 font-bold uppercase">
                            <tr>
                                <th class="p-3 text-left pl-6">科目</th>
                                <th class="p-3 text-center">我的得分</th>
                                <th class="p-3 text-center">年級平均</th>
                                <th class="p-3 text-center">年級高標 (前50%)</th>
                            </tr>
                        </thead>
                        <tbody id="gradeTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card p-6">
                <div class="radar-box"><canvas id="radarChart"></canvas></div>
            </div>
        </div>

        <!-- 管理員 -->
        <footer class="mt-12 py-10 flex flex-col items-center">
            <button onclick="openAdminModal()" class="text-[9px] font-bold text-slate-300 tracking-widest uppercase underline">管理員模式</button>
            <div id="adminPanel" class="hidden mt-4 w-full bg-slate-900 rounded-2xl p-6 space-y-4">
                <div class="text-white text-[10px] font-bold opacity-50">貼上 Excel 欄位：班級、座號、姓名、生日、身分證末4、國、英、數、社、自、加權、班排、校排</div>
                <textarea id="rawInput" rows="5" class="w-full bg-slate-800 text-white p-3 rounded-lg text-xs font-mono" placeholder="從 Excel 複製 13 個欄位貼上..."></textarea>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="examTitleInput" class="flex-1 bg-slate-800 text-white rounded-lg p-3 text-xs" placeholder="考試標題 (例如: 113-1第一次段考)">
                    <input type="password" id="adminSecretToken" class="bg-slate-800 text-white rounded-lg p-3 text-xs" placeholder="輸入管理私鑰">
                    <button id="saveBtn" onclick="saveToSheets()" class="bg-blue-600 text-white px-6 py-3 rounded-lg text-xs font-bold shadow-lg active:scale-95 transition-all">發布至 Sheets</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyX9rQwndThgxZva9ePiLLScuGb6-L1N9CuMP5MxSWaWSzBMOGxHJaT5E6Ee8JhAzSc/exec"; 
        let cloudData = [], charts = {};

        async function fetchExams() {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read' })
                });
                const result = await res.json();
                if (result.result === 'success') {
                    cloudData = result.data;
                    const sel = document.getElementById('examSelect');
                    if (cloudData.length) {
                        sel.innerHTML = cloudData.map(ex => `<option value="${ex.id}">${ex.id}</option>`).join('');
                        document.getElementById('cloudStatus').innerText = 'Sheets 資料讀取成功';
                    } else {
                        sel.innerHTML = '<option value="">表格內尚無資料</option>';
                        document.getElementById('cloudStatus').innerText = '雲端尚無資料';
                    }
                }
            } catch (e) {
                document.getElementById('cloudStatus').innerText = '連線失敗';
            }
        }

        window.onload = fetchExams;

        window.searchGrades = () => {
            const exId = document.getElementById('examSelect').value;
            const c = document.getElementById('classNum').value.trim();
            const s = document.getElementById('seatNum').value.trim().padStart(2, '0');
            const b = document.getElementById('birthday').value.trim();
            const idL = document.getElementById('idLastFour').value.trim();

            const exam = cloudData.find(ex => ex.id === exId);
            if (!exam) return alert("請選擇考試");

            const user = exam.entries.find(e => e.class === c && e.seat.padStart(2, '0') === s && e.birthday === b && e.idLastFour === idL);
            if (user) {
                renderReport(user, exam);
                document.getElementById('searchView').classList.add('hidden-view');
                document.getElementById('reportView').classList.replace('hidden-view', 'active-view');
            } else {
                alert("查無資料，請確認輸入內容是否正確");
            }
        };

        window.saveToSheets = async () => {
            const token = document.getElementById('adminSecretToken').value;
            const title = document.getElementById('examTitleInput').value.trim();
            const raw = document.getElementById('rawInput').value.trim();
            
            if(!token || !title || !raw) return alert("請填寫所有欄位");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "上傳中...";

            let entries = raw.split('\n').map(l => {
                const p = l.split('\t');
                if (p.length < 13) return null;
                
                return { 
                    class: p[0], 
                    seat: p[1], 
                    name: p[2], 
                    birthday: p[3], 
                    idLastFour: p[4], 
                    scores: [parseFloat(p[5])||0, parseFloat(p[6])||0, parseFloat(p[7])||0, parseFloat(p[8])||0, parseFloat(p[9])||0], 
                    weightedAvg: parseFloat(p[10]) || 0,
                    classRank: p[11],  
                    schoolRank: p[12]
                };
            }).filter(e => e);

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'save', token: token, title: title, entries: entries })
                });
                const result = await res.json();
                if(result.result === 'success') {
                    alert("發布成功！");
                    location.reload();
                } else {
                    alert("錯誤：" + result.message);
                }
            } catch (e) {
                alert("發布失敗");
            } finally {
                btn.disabled = false; btn.innerText = "發布至 Sheets";
            }
        };

        function renderReport(targetUser, exam) {
            const subs = ["國文", "英文", "數學", "社會", "自然"];
            const targetGradePrefix = targetUser.class.charAt(0); // 取得年級 (班級首碼)
            
            // 篩選同年級所有學生
            const gradeEntries = exam.entries.filter(e => e.class.startsWith(targetGradePrefix));
            const classEntries = exam.entries.filter(e => e.class === targetUser.class);

            // 計算年級統計數據
            const gradeStats = subs.map((_, i) => {
                const allScores = gradeEntries.map(e => e.scores[i]).sort((a, b) => b - a);
                // 年級平均
                const avg = allScores.reduce((a, b) => a + b, 0) / allScores.length;
                // 年級高標 (前 50% 平均)
                const highCount = Math.max(1, Math.floor(allScores.length * 0.5));
                const highAvg = allScores.slice(0, highCount).reduce((a, b) => a + b, 0) / highCount;
                return { avg: avg.toFixed(1), high: highAvg.toFixed(1) };
            });

            document.getElementById('displayName').innerText = targetUser.name;
            document.getElementById('displayClass').innerText = `${targetUser.class}班 ${targetUser.seat}號`;
            document.getElementById('displayClassRank').innerText = targetUser.classRank;
            document.getElementById('displayClassTotal').innerText = classEntries.length;
            document.getElementById('displaySchoolRank').innerText = targetUser.schoolRank;
            document.getElementById('displaySchoolTotal').innerText = gradeEntries.length;
            document.getElementById('weightedAvgDisp').innerText = targetUser.weightedAvg.toFixed(1);

            // 渲染表格 (包含平均與高標)
            document.getElementById('gradeTableBody').innerHTML = targetUser.scores.map((s, i) => `
                <tr class="border-b">
                    <td class="p-4 font-bold text-slate-500 pl-6">${subs[i]}</td>
                    <td class="p-4 text-center text-blue-600 font-black text-lg">${s}</td>
                    <td class="p-4 text-center text-slate-400 font-medium">${gradeStats[i].avg}</td>
                    <td class="p-4 text-center text-indigo-500 font-medium">${gradeStats[i].high}</td>
                </tr>
            `).join('');

            // 雷達圖對比 (個人 vs 年級平均)
            if (charts.radar) charts.radar.destroy();
            charts.radar = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: subs,
                    datasets: [
                        {
                            label: '我的成績',
                            data: targetUser.scores,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#2563eb',
                            zIndex: 2
                        },
                        {
                            label: '年級平均',
                            data: gradeStats.map(s => s.avg),
                            borderColor: '#cbd5e1',
                            borderDash: [5, 5],
                            fill: false,
                            borderWidth: 2,
                            pointRadius: 0,
                            zIndex: 1
                        }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: { r: { beginAtZero: true, max: 100, ticks: { display: false } } },
                    plugins: { 
                        legend: { 
                            display: true,
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } }
                        } 
                    }
                }
            });

            // 勳章顯示
            document.getElementById('honorBanner').classList.remove('hidden');
            const excellence = targetUser.scores.map((s, i) => s >= 90 ? subs[i] : null).filter(s => s);
            if (excellence.length) {
                document.getElementById('excellenceBox').classList.remove('hidden');
                document.getElementById('excellenceMsg').innerHTML = `<div class="flex items-center gap-2"><span class="text-2xl">🏅</span><div><div class="text-xs font-bold text-amber-500 uppercase">頂尖學科</div><div class="text-sm font-black text-amber-800">${excellence.join('、')} 表現優異！</div></div></div>`;
            } else { document.getElementById('excellenceBox').classList.add('hidden'); }
            
            const advantage = targetUser.scores.map((s, i) => s > gradeStats[i].avg ? subs[i] : null).filter(s => s);
            if (advantage.length) {
                document.getElementById('advantageBox').classList.remove('hidden');
                document.getElementById('advantageMsg').innerHTML = `<div class="flex items-center gap-2"><span class="text-2xl">📈</span><div><div class="text-xs font-bold text-indigo-500 uppercase">優勢學科</div><div class="text-sm font-black text-indigo-800">${advantage.join('、')} 高於年級平均。</div></div></div>`;
            } else { document.getElementById('advantageBox').classList.add('hidden'); }
        }

        window.backToSearch = () => {
            document.getElementById('reportView').classList.replace('active-view', 'hidden-view');
            document.getElementById('searchView').classList.replace('hidden-view', 'active-view');
        };

        window.openAdminModal = () => document.getElementById('adminPanel').classList.toggle('hidden');
    </script>
</body>
</html>
